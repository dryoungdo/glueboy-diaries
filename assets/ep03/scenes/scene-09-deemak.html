<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a1628; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; font-family: 'Noto Sans Thai', sans-serif; }
  /* Warm glow behind phone */
  .phone-glow { position: absolute; width: 400px; height: 600px; background: radial-gradient(ellipse, rgba(245,166,35,0.1) 0%, transparent 70%); }
  /* Phone frame */
  .phone { width: 320px; height: 580px; background: #12121a; border-radius: 36px; border: 3px solid #2a2a3a; position: relative; z-index: 1; padding: 60px 20px 40px; display: flex; flex-direction: column; }
  .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 100px; height: 24px; background: #0a1628; border-radius: 12px; }
  /* Chat area */
  .chat { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; gap: 12px; }
  .msg-time { text-align: center; font-size: 12px; color: #484f58; margin-bottom: 8px; }
  .msg-bubble { background: #1a2a3a; border-radius: 16px 16px 16px 4px; padding: 14px 20px; max-width: 240px; }
  .msg-bubble.captain { background: #1a3a2a; }
  .msg-sender { font-size: 11px; font-weight: 700; color: #58a6ff; margin-bottom: 4px; }
  .msg-bubble.captain .msg-sender { color: #3fb950; }
  .msg-text { font-size: 18px; color: #e6edf3; line-height: 1.5; }
  .msg-deemak { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); border-radius: 16px 16px 4px 16px; padding: 14px 20px; max-width: 240px; align-self: flex-end; }
  .msg-deemak .msg-sender { color: #f5a623; }
  .msg-deemak .msg-text { color: #f5a623; font-size: 32px; font-weight: 700; }
</style>
</head>
<body>
  <div class="phone-glow"></div>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="chat">
      <div class="msg-time">06:42 AM</div>
      <div class="msg-bubble">
        <div class="msg-sender">GLUEBOY</div>
        <div class="msg-text">Captain ครับ ทุกอย่างเสร็จแล้ว</div>
      </div>
      <div class="msg-bubble">
        <div class="msg-sender">GLUEBOY</div>
        <div class="msg-text">47 commits<br>0 errors<br>พร้อมใช้งาน</div>
      </div>
      <div class="msg-deemak">
        <div class="msg-sender">Captain</div>
        <div class="msg-text">ดีมาก</div>
      </div>
    </div>
  </div>
</body>
</html>
