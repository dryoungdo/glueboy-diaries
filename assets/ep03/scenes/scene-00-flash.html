<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%); }
  .text { font-family: 'Kanit', sans-serif; font-size: 140px; font-weight: 900; color: #f5a623; text-shadow: 0 0 80px rgba(245,166,35,0.5), 0 0 160px rgba(245,166,35,0.2); position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="text">ดีมาก</div>
</body>
</html>
