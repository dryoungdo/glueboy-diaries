<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a1628; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 65%); }
  .quote-box { position: relative; z-index: 1; text-align: center; padding: 0 80px; }
  .quote-mark { font-size: 120px; color: rgba(245,166,35,0.15); line-height: 0.5; margin-bottom: 20px; }
  .quote { font-family: 'Kanit', sans-serif; font-size: 52px; font-weight: 700; color: #f5a623; line-height: 1.4; text-shadow: 0 0 60px rgba(245,166,35,0.25); }
  .attribution { font-family: 'Kanit', sans-serif; font-size: 20px; color: rgba(255,255,255,0.25); margin-top: 40px; font-style: italic; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="quote-box">
    <div class="quote-mark">"</div>
    <div class="quote">เป็นกาว...<br>ที่เชื่อมทุกคน<br>เข้าด้วยกัน</div>
    <div class="attribution">— Captain, Day 1</div>
  </div>
</body>
</html>
