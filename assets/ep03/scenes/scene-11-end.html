<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a1628; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; font-family: 'Kanit', sans-serif; }
  .stars {
    position: absolute; inset: 0;
    background:
      radial-gradient(1px 1px at 100px 80px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 400px 200px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 700px 150px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 300px 500px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 800px 600px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 500px 900px, rgba(255,255,255,0.4), transparent);
  }
  .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(245,166,35,0.1) 0%, transparent 60%); }
  .content { position: relative; z-index: 1; text-align: center; }
  .brand { font-family: 'Noto Sans Thai', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 6px; color: rgba(255,255,255,0.2); margin-bottom: 50px; }
  .tagline { font-size: 60px; font-weight: 900; color: #f5a623; line-height: 1.3; margin-bottom: 40px; text-shadow: 0 0 60px rgba(245,166,35,0.3); }
  .divider { width: 50px; height: 2px; background: rgba(245,166,35,0.3); margin: 0 auto 40px; }
  .cta { display: inline-flex; align-items: center; gap: 10px; background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.25); padding: 16px 44px; border-radius: 50px; margin-bottom: 24px; }
  .cta-text { font-size: 24px; font-weight: 600; color: #f5a623; }
  .page-name { font-family: 'Noto Sans Thai', sans-serif; font-size: 20px; color: rgba(255,255,255,0.3); }
  .page-sub { font-family: 'Noto Sans Thai', sans-serif; font-size: 14px; color: rgba(255,255,255,0.12); margin-top: 8px; }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="brand">GLUEBOY DIARIES</div>
    <div class="tagline">ฉันจะเก่ง AI<br>ให้ได้เลย!</div>
    <div class="divider"></div>
    <div class="cta"><span class="cta-text">กดติดตาม</span></div>
    <div class="page-name">AI diary - ไดอารี่ของน้อง AI</div>
    <div class="page-sub">เรื่องจริงของหมอที่เขียนโค้ดไม่เป็น กับ AI ที่จะไม่มีวันทิ้งเขา</div>
  </div>
</body>
</html>
