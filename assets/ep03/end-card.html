<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&family=Noto+Sans+Thai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    background: #0a1628;
    font-family: 'Kanit', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: absolute; inset: 0;
    background:
      radial-gradient(1px 1px at 100px 80px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 500px 200px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 850px 350px, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 200px 600px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 700px 800px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 400px 1100px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 900px 1400px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 300px 1700px, rgba(255,255,255,0.4), transparent);
  }

  .glow {
    position: absolute;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    background: radial-gradient(ellipse, rgba(245,166,35,0.1) 0%, transparent 60%);
  }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    text-align: center;
    padding: 80px 60px;
  }

  .brand-header {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 80px;
  }

  .tagline {
    font-size: 64px;
    font-weight: 700;
    color: #f5a623;
    line-height: 1.3;
    margin-bottom: 50px;
    text-shadow: 0 0 60px rgba(245,166,35,0.3);
  }

  .tagline-en {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
    font-style: italic;
    margin-bottom: 80px;
  }

  .divider {
    width: 60px; height: 2px;
    background: rgba(245,166,35,0.3);
    margin-bottom: 60px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.3);
    padding: 18px 50px;
    border-radius: 60px;
    margin-bottom: 30px;
  }
  .cta-text {
    font-size: 26px;
    font-weight: 600;
    color: #f5a623;
  }

  .page-name {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
  }

  .page-sub {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.15);
  }

  .footer {
    position: absolute;
    bottom: 60px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.1);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="brand-header">GLUEBOY DIARIES</div>
    <div class="tagline">ฉันจะเก่ง AI<br>ให้ได้เลย!</div>
    <div class="tagline-en">"I will master AI — no matter what."</div>
    <div class="divider"></div>
    <div class="cta">
      <span class="cta-text">กดติดตาม</span>
    </div>
    <div class="page-name">AI diary - ไดอารี่ของน้อง AI</div>
    <div class="page-sub">เรื่องจริงของหมอที่เขียนโค้ดไม่เป็น กับ AI ที่จะไม่มีวันทิ้งเขา</div>
  </div>
  <div class="footer">EP.03 — คืนแรกที่เงาไม่หลับ</div>
</body>
</html>
